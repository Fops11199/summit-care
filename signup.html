<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign up for Summit Care - Create your healthcare portal account securely." />
    <title>Sign Up | Summit Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--color-bg-alt);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-main {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(15,23,42,0.02) 0%, rgba(16,185,129,0.05) 100%);
        }

        .signup-card {
            background: var(--color-bg);
            border-radius: var(--radius-3xl);
            box-shadow: var(--shadow-xl);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .signup-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .signup-brand .logo-mark {
            color: var(--color-accent);
            font-size: 2.2rem;
        }

        .signup-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .signup-card p {
            color: var(--color-text-muted);
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .signup-trust {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: var(--color-text);
            margin-bottom: 1.5rem;
            background: var(--color-bg-alt);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
        }

        .signup-trust i {
            color: var(--color-accent);
        }

        .signup-progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            width: 100%;
        }

        .signup-step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .signup-step .step-icon {
            font-size: 1.2rem;
            color: var(--color-text-muted);
            background: var(--color-bg-alt);
            border-radius: 50%;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .signup-step.active .step-icon {
            color: white;
            background: var(--color-primary);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
        }

        .signup-step .step-label {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .signup-step.active .step-label {
            color: var(--color-primary);
            font-weight: 600;
        }

        .signup-form {
            width: 100%;
        }

        .signup-form .form-field {
            margin-bottom: 1.2rem;
        }

        .signup-form label {
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.4rem;
            display: block;
            font-size: 0.9rem;
        }

        .signup-form input,
        .signup-form select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--color-bg-alt);
        }

        .signup-form input:focus,
        .signup-form select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(15,23,42,0.1);
        }

        .step-actions {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .signup-btn {
            width: 100%;
            background: var(--color-bg-alt);
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: 0.8rem 0;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .signup-btn.enabled {
            cursor: pointer;
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        
        button[type="submit"].signup-btn.enabled,
        .next-step.enabled {
           background: var(--color-primary);
           color: white;
        }

        .signup-btn:hover.enabled {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button[type="submit"].signup-btn:hover.enabled,
        .next-step:hover.enabled {
           background: var(--color-primary-hover);
        }

        .signup-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.8;
        }

        .signup-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            margin: 0 0.4rem;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1rem;
            transition: color 0.3s;
        }

        .home-link:hover {
            color: var(--color-primary);
        }

        .social-signup {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .social-signup span {
            display: block;
            margin-bottom: 0.75rem;
        }

        .social-btn {
            background: var(--color-bg-alt);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: 0.6rem 1.2rem;
            margin: 0 0.3rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: var(--color-bg);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .consent-options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .consent-checkbox {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: var(--color-bg-alt);
            border-radius: var(--radius-lg);
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            font-size: 0.9rem;
            color: var(--color-text);
        }

        .consent-checkbox input[type="checkbox"] {
            accent-color: var(--color-accent);
            width: 1.2rem;
            height: 1.2rem;
        }

        .mark-all-btn {
            background: var(--color-bg-alt);
            color: var(--color-primary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            padding: 0.5rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.7rem;
            transition: all 0.3s ease;
        }

        .mark-all-btn:hover {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        @media (max-width: 900px) {
            .signup-main {
                padding: 2rem 1rem;
            }
            .signup-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
    <script defer src="signup.js"></script>
</head>

<body>
    <div class="signup-main">
        <div class="signup-card">
            <a href="index.html" class="home-link" aria-label="Back to Home">
                <i class="fas fa-arrow-left"></i> Home
            </a>
            <div class="signup-brand">
                <span class="logo-mark" aria-hidden="true">+</span>
                <span class="logo-text">Summit Care</span>
            </div>
            <h1>Start Your Summit Care Journey</h1>
            <p>Create your secure healthcare account in minutes.</p>
            <div class="signup-trust">
                <i class="fas fa-lock"></i>
                <span>Your information is encrypted & confidential</span>
            </div>
            <form class="signup-form" id="signupForm" novalidate>
                <div class="form-step active" data-step="1">
                    <div class="form-field">
                        <label for="fullName">Full Name</label>
                        <input id="fullName" name="fullName" type="text" autocomplete="name" placeholder="Enter your full name" required />
                    </div>
                    <div class="form-field">
                        <label for="email">Email Address</label>
                        <input id="email" name="email" type="email" autocomplete="email" placeholder="your@email.com" required />
                    </div>
                    <div class="form-field">
                        <label for="phone">Mobile Phone</label>
                        <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="(123) 456-7890" required />
                    </div>
                    <div class="form-field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a strong password" required />
                    </div>
                    <div class="form-field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm your password" required />
                    </div>
                    <div class="step-actions">
                        <button type="button" class="signup-btn next-step" data-next="2">Next</button>
                    </div>
                </div>
                <div class="form-step" data-step="2">
                    <div class="form-field">
                        <label for="dateOfBirth">Date of Birth</label>
                        <input id="dateOfBirth" name="dateOfBirth" type="date" required />
                    </div>
                    <div class="form-field">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="address">Address</label>
                        <input id="address" name="address" type="text" autocomplete="street-address" placeholder="Enter your address" required />
                    </div>
                    <div class="step-actions">
                        <button type="button" class="signup-btn prev-step" data-prev="1">Previous</button>
                        <button type="button" class="signup-btn next-step" data-next="3">Next</button>
                    </div>
                </div>
                <div class="form-step" data-step="3">
                    <div class="form-field">
                        <label for="bloodGroup">Blood Group</label>
                        <select id="bloodGroup" name="bloodGroup">
                            <option value="">Select blood group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="allergies">Allergies <span style="font-weight:400;color:#888;font-size:0.95em;">(optional)</span></label>
                        <input id="allergies" name="allergies" type="text" placeholder="List any allergies" />
                    </div>
                    <div class="form-field">
                        <label for="insuranceId">Insurance / Patient ID <span style="font-weight:400;color:#888;font-size:0.95em;">(optional)</span></label>
                        <input id="insuranceId" name="insuranceId" type="text" placeholder="Enter insurance or patient ID" />
                    </div>
                    <div class="step-actions">
                        <button type="button" class="signup-btn prev-step" data-prev="2">Previous</button>
                        <button type="button" class="signup-btn next-step" data-next="4">Next</button>
                    </div>
                </div>
                <div class="form-step" data-step="4">
                    <div class="consent-options">
                        <button type="button" class="mark-all-btn" id="markAllBtn">Mark All</button>
                        <label class="consent-checkbox"><input type="checkbox" name="consent_privacy" required /> I agree to the <a href="privacy.html" target="_blank">Privacy Policy</a></label>
                        <label class="consent-checkbox"><input type="checkbox" name="consent_terms" required /> I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a></label>
                        <label class="consent-checkbox"><input type="checkbox" name="consent_general" required /> I consent to receive care as described in the <a href="consent.html" target="_blank">Consent to Treat</a></label>
                    </div>
                    <div class="step-actions">
                        <button type="button" class="signup-btn prev-step" data-prev="3">Previous</button>
                        <button type="submit" class="signup-btn">Sign Up</button>
                    </div>
                </div>
            </form>
            <div class="social-signup">
                <span>Or sign up with:</span>
                <button type="button" class="social-btn google"><i class="fab fa-google"></i> Google</button>
                <button type="button" class="social-btn apple"><i class="fab fa-apple"></i> Apple</button>
            </div>
            <div class="signup-footer">
                <span>Already have an account? <a href="login.html">Sign in here</a></span><br>
                <a href="privacy.html">Privacy Policy</a> |
                <a href="terms.html">Terms of Use</a> |
                <a href="consent.html">Consent</a> |

            </div>
        </div>
    </div>
</body>

</html>
